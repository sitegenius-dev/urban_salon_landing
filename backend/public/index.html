<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content=" urban company clenaing & services " />
    <title>Urban Company</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/assets/index-BY2SpWCE.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D82vCXjL.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        const defaultTitle = document.title;
        const titleEl = document.querySelector('title');
        const faviconEl = document.querySelector('link[rel="icon"]');
        let brandingObserverStarted = false;

        function splitName(name) {
          const value = (name || '').trim();
          if (!value) return ['Urban', 'Company'];
          const parts = value.split(/\s+/);
          if (parts.length === 1) return [parts[0], ''];
          const midpoint = Math.ceil(parts.length / 2);
          return [parts.slice(0, midpoint).join(' '), parts.slice(midpoint).join(' ')];
        }

        function applyBranding(settings) {
          const brandName = (settings.site_title || settings.service_name || defaultTitle || 'Urban Company').trim();
          const logoUrl = (settings.site_logo || '').trim();
          const [lineOne, lineTwo] = splitName(brandName);

          document.title = brandName;
          if (titleEl) {
            titleEl.textContent = brandName;
          }

          if (logoUrl && faviconEl) {
            faviconEl.href = logoUrl;
          }

          const brandingContainer = document.querySelector('nav .flex-1.flex.justify-center.items-center.gap-2');
          if (!brandingContainer) return;

          brandingContainer.querySelectorAll('[data-backend-branding="true"]').forEach(function (node) {
            node.remove();
          });

          const existingNodes = Array.from(brandingContainer.children).slice(0, 3);
          existingNodes.forEach(function (node) {
            node.style.display = 'none';
          });

          const wrapper = document.createElement('div');
          wrapper.setAttribute('data-backend-branding', 'true');
          wrapper.style.display = 'flex';
          wrapper.style.alignItems = 'center';
          wrapper.style.gap = '8px';

          if (logoUrl) {
            const img = document.createElement('img');
            img.src = logoUrl;
            img.alt = brandName + ' logo';
            img.style.width = '32px';
            img.style.height = '32px';
            img.style.objectFit = 'contain';
            img.style.borderRadius = '8px';
            img.style.flexShrink = '0';
            wrapper.appendChild(img);
          }

          const textWrap = document.createElement('div');
          textWrap.style.textAlign = 'left';

          const firstLine = document.createElement('div');
          firstLine.textContent = lineOne;
          firstLine.style.fontSize = '11px';
          firstLine.style.fontWeight = '600';
          firstLine.style.lineHeight = '1.1';
          firstLine.style.color = '#111827';
          textWrap.appendChild(firstLine);

          if (lineTwo) {
            const secondLine = document.createElement('div');
            secondLine.textContent = lineTwo;
            secondLine.style.fontSize = '11px';
            secondLine.style.fontWeight = '600';
            secondLine.style.lineHeight = '1.1';
            secondLine.style.color = '#111827';
            textWrap.appendChild(secondLine);
          }

          wrapper.appendChild(textWrap);
          brandingContainer.appendChild(wrapper);
        }

        function createField(labelText, input) {
          const wrapper = document.createElement('div');
          wrapper.style.display = 'grid';
          wrapper.style.gap = '6px';

          const label = document.createElement('label');
          label.textContent = labelText;
          label.style.color = '#e5e7eb';
          label.style.fontSize = '14px';
          label.style.fontWeight = '600';

          wrapper.appendChild(label);
          wrapper.appendChild(input);
          return wrapper;
        }

        function ensureBrandingAdminPanel(settings) {
          if (window.location.pathname !== '/admin/settings') return;
          const settingsRoot = Array.from(document.querySelectorAll('h1')).find(function (heading) {
            return heading.textContent && heading.textContent.trim() === 'Settings';
          });
          if (!settingsRoot) return;

          const host = settingsRoot.closest('div.space-y-5') || settingsRoot.parentElement?.parentElement;
          if (!host) return;

          const existing = document.getElementById('backend-branding-settings-card');
          if (existing) {
            const titleInput = existing.querySelector('input[name="site_title"]');
            const preview = existing.querySelector('[data-logo-preview]');
            if (titleInput && document.activeElement !== titleInput) {
              titleInput.value = settings.site_title || settings.service_name || '';
            }
            if (preview) {
              preview.src = settings.site_logo || '';
              preview.style.display = settings.site_logo ? 'block' : 'none';
            }
            return;
          }

          const card = document.createElement('div');
          card.id = 'backend-branding-settings-card';
          card.style.background = '#111111';
          card.style.border = '1px solid rgba(255,255,255,0.08)';
          card.style.borderRadius = '16px';
          card.style.padding = '24px';
          card.style.marginTop = '20px';
          card.style.display = 'grid';
          card.style.gap = '16px';

          const heading = document.createElement('div');
          heading.innerHTML = '<h2 style="margin:0;color:#fff;font-size:20px;font-weight:800;">Branding</h2><p style="margin:6px 0 0;color:#9ca3af;font-size:14px;">Manage the site title and logo from backend settings.</p>';

          const titleInput = document.createElement('input');
          titleInput.name = 'site_title';
          titleInput.type = 'text';
          titleInput.value = settings.site_title || settings.service_name || '';
          titleInput.placeholder = 'Enter site title';
          titleInput.style.width = '100%';
          titleInput.style.background = '#0b0b0b';
          titleInput.style.border = '1px solid rgba(255,255,255,0.1)';
          titleInput.style.borderRadius = '12px';
          titleInput.style.padding = '12px 14px';
          titleInput.style.color = '#ffffff';
          titleInput.style.outline = 'none';

          const fileInput = document.createElement('input');
          fileInput.type = 'file';
          fileInput.accept = 'image/*';
          fileInput.style.width = '100%';
          fileInput.style.color = '#d1d5db';

          const preview = document.createElement('img');
          preview.setAttribute('data-logo-preview', 'true');
          preview.src = settings.site_logo || '';
          preview.alt = 'Site logo preview';
          preview.style.width = '72px';
          preview.style.height = '72px';
          preview.style.objectFit = 'contain';
          preview.style.borderRadius = '12px';
          preview.style.background = '#ffffff';
          preview.style.padding = '8px';
          preview.style.display = settings.site_logo ? 'block' : 'none';

          const actions = document.createElement('div');
          actions.style.display = 'flex';
          actions.style.gap = '12px';
          actions.style.flexWrap = 'wrap';

          const saveButton = document.createElement('button');
          saveButton.type = 'button';
          saveButton.textContent = 'Save Title';
          saveButton.style.background = '#d4af37';
          saveButton.style.color = '#111';
          saveButton.style.border = 'none';
          saveButton.style.borderRadius = '12px';
          saveButton.style.padding = '12px 16px';
          saveButton.style.fontWeight = '700';
          saveButton.style.cursor = 'pointer';

          const uploadButton = document.createElement('button');
          uploadButton.type = 'button';
          uploadButton.textContent = 'Upload Logo';
          uploadButton.style.background = '#2563eb';
          uploadButton.style.color = '#fff';
          uploadButton.style.border = 'none';
          uploadButton.style.borderRadius = '12px';
          uploadButton.style.padding = '12px 16px';
          uploadButton.style.fontWeight = '700';
          uploadButton.style.cursor = 'pointer';

          const status = document.createElement('div');
          status.style.fontSize = '13px';
          status.style.color = '#9ca3af';

          const getAuthToken = function () {
            return localStorage.getItem('salon_token') || '';
          };

          saveButton.addEventListener('click', function () {
            const token = getAuthToken();
            const value = titleInput.value.trim();
            if (!value) {
              status.textContent = 'Site title is required.';
              status.style.color = '#fca5a5';
              return;
            }

            saveButton.disabled = true;
            status.textContent = 'Saving title...';
            status.style.color = '#9ca3af';

            fetch('/api/settings/bulk', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: token ? 'Bearer ' + token : '',
              },
              body: JSON.stringify({
                site_title: value,
              }),
            })
              .then(function (response) {
                if (!response.ok) throw new Error('Failed to save title');
                return response.json();
              })
              .then(function () {
                settings.site_title = value;
                settings.service_name = value;
                applyBranding(settings);
                status.textContent = 'Site title updated.';
                status.style.color = '#86efac';
              })
              .catch(function () {
                status.textContent = 'Failed to save site title.';
                status.style.color = '#fca5a5';
              })
              .finally(function () {
                saveButton.disabled = false;
              });
          });

          uploadButton.addEventListener('click', function () {
            const token = getAuthToken();
            const file = fileInput.files && fileInput.files[0];
            if (!file) {
              status.textContent = 'Please choose a logo file first.';
              status.style.color = '#fca5a5';
              return;
            }

            const formData = new FormData();
            formData.append('logo', file);
            uploadButton.disabled = true;
            status.textContent = 'Uploading logo...';
            status.style.color = '#9ca3af';

            fetch('/api/settings/upload-logo', {
              method: 'POST',
              headers: {
                Authorization: token ? 'Bearer ' + token : '',
              },
              body: formData,
            })
              .then(function (response) {
                if (!response.ok) throw new Error('Failed to upload logo');
                return response.json();
              })
              .then(function (data) {
                if (data && data.url) {
                  settings.site_logo = data.url;
                  preview.src = data.url;
                  preview.style.display = 'block';
                  applyBranding(settings);
                }
                status.textContent = 'Logo uploaded.';
                status.style.color = '#86efac';
              })
              .catch(function () {
                status.textContent = 'Failed to upload logo.';
                status.style.color = '#fca5a5';
              })
              .finally(function () {
                uploadButton.disabled = false;
              });
          });

          actions.appendChild(saveButton);
          actions.appendChild(uploadButton);
          card.appendChild(heading);
          card.appendChild(createField('Site Title', titleInput));
          card.appendChild(createField('Logo Image', fileInput));
          card.appendChild(preview);
          card.appendChild(actions);
          card.appendChild(status);

          host.appendChild(card);
        }

        function startBrandingObserver(settings) {
          if (brandingObserverStarted) return;
          brandingObserverStarted = true;
          const root = document.getElementById('root');
          if (!root) return;
          const observer = new MutationObserver(function () {
            applyBranding(settings || {});
            ensureBrandingAdminPanel(settings || {});
          });
          observer.observe(root, { childList: true, subtree: true });
        }

        function loadBranding() {
          fetch('/api/settings/public')
            .then(function (response) {
              if (!response.ok) throw new Error('Failed to load branding');
              return response.json();
            })
            .then(function (settings) {
              applyBranding(settings || {});
              ensureBrandingAdminPanel(settings || {});
              startBrandingObserver(settings || {});
            })
            .catch(function () {});
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', loadBranding);
        } else {
          loadBranding();
        }
      })();
    </script>
  </body>
</html>
